name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Before you file, please search existing issues — there may already be discussion.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain point, not the solution. Example — "JitCatch flags too many false positives for changes that are intentional business-logic updates."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you address the problem? Include flag names, output shape, or CLI behavior if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Affected area
      multiple: true
      options:
        - CLI / flags
        - Test generation (intent-aware or dodgy-diff)
        - Reviewer channel
        - Assessor (rules / judge)
        - Runner / worktree sandbox
        - Report output (JSON / markdown)
        - Language adapter (Python / JS / new language)
        - Provider integration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, example output, links to related projects, etc.
    validations:
      required: false
